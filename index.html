<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters Pool 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --green: #0d2e1e; --gold: #c9a84c; --cream: #f5f0e4; --white: #ffffff; --red: #ff5252; }
    body { background: var(--green); color: var(--cream); font-family: 'Cormorant Garamond', serif; margin: 0; padding: 10px; }
    header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(201,168,76,0.3); }
    h1 { font-family: 'Playfair Display', serif; color: var(--white); margin: 0; font-size: 2.2rem; }
    .status-bar { max-width: 1200px; margin: 10px auto; padding: 10px 20px; background: rgba(0,0,0,0.25); border-radius: 4px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(201,168,76,0.1); }
    #statusLine { font-size: 0.85rem; color: var(--gold); }
    .sync-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; border-radius: 3px; }
    
    main { max-width: 1200px; margin: 10px auto; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; background: rgba(0,0,0,0.15); border-radius: 4px; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid var(--gold); text-transform: uppercase; font-size: 0.7rem; color: var(--gold); letter-spacing: 1px; }
    td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
    
    .rank-col { font-weight: bold; color: var(--gold); text-align: center; width: 45px; font-size: 1.2rem; }
    .owner-col { font-weight: 600; width: 160px; color: var(--white); font-size: 1rem; }
    
    /* 3-Row Vertical Display */
    .g-name { display: block; font-weight: 600; color: var(--white); font-size: 0.95rem; margin-bottom: 2px; }
    .g-score { display: block; font-size: 0.85rem; color: var(--gold); margin-bottom: 1px; }
    .g-pos { display: block; font-size: 0.8rem; opacity: 0.5; font-style: italic; }
    
    .total-col { font-family: 'Playfair Display', serif; font-size: 1.6rem; text-align: center; color: var(--gold); font-weight: 700; width: 85px; }
    .is-mc { color: var(--red) !important; opacity: 0.7; }
    footer { text-align: center; padding: 40px; font-size: 0.75rem; opacity: 0.3; }
  </style>
</head>
<body>

<header>
  <h1>Masters Pool <span>2026</span></h1>
  <div style="font-size: 0.9rem; font-style: italic; color: var(--gold);">In Memory of Geoff Martyn</div>
</header>

<div class="status-bar">
  <div id="statusLine">Connecting to live feed...</div>
  <button class="sync-btn" onclick="runSync()">↻ Sync Scores</button>
</div>

<main id="board">
  <div style="text-align:center; padding:100px; color:var(--gold);">⛳ Establishing secure connection to Augusta...</div>
</main>

<footer>Live data via ESPN API · Sum of Positions Wins · MC Penalty: 63</footer>

<script>
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';
// Proxy list for waterfall fallback
const PROXIES = [
  'https://api.allorigins.win/get?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest='
];

const ENTRIES = [
  { owner:'Gary Mann', golfers:['Scheffler','Rose','Young','Fleetwood'] },
  { owner:'Joe Greiner 1', golfers:['Scheffler','Fleetwood','Fitzpatrick','Reed'] },
  { owner:'Matt Maher', golfers:['Scheffler','Aberg','Young','Fleetwood'] },
  { owner:'Chris Madison 2', golfers:['Young','Schauffele','Rose','McIlroy'] },
  { owner:'Chris Haddock', golfers:['Scheffler','McIlroy','Scott','Day'] },
  { owner:'Brian Bateh 2', golfers:['Scheffler','Young','Spieth','Morikawa'] },
  { owner:'Nick Canatsey', golfers:['Young','Fitzpatrick','Schauffele','Rose'] },
  { owner:'Jeremy Malcolm 1', golfers:['Scheffler','McIlroy','Young','Spaun'] },
  { owner:'Vince Caporuscio', golfers:['Schauffele','Young','McIlroy','Aberg'] },
  { owner:'Chris Madison 3', golfers:['Scheffler','Rahm','Bridgeman','Young'] },
  { owner:'Bill Nunley', golfers:['Scheffler','McIlroy','Rahm','DeChambeau'] },
  { owner:'Amy Beth Roy', golfers:['Young','Schauffele','Aberg','McNealy'] },
  { owner:'Brian Hegenbart 3', golfers:['Scheffler','Aberg','DeChambeau','Young'] },
  { owner:'Gary Felice', golfers:['DeChambeau','Schauffele','Rahm','Im'] },
  { owner:'Dan Murphy', golfers:['Scheffler','Rahm','Reed','Schauffele'] },
  { owner:'Rob Salem', golfers:['DeChambeau','Young','Aberg','Fitzpatrick'] },
  { owner:'Dave Mornhinweg', golfers:['Fitzpatrick','Rahm','Bhatia','Schauffele'] },
  { owner:'KC Arns 2', golfers:['DeChambeau','McIlroy','Schauffele','Fleetwood'] },
  { owner:'Chris Madison 1', golfers:['DeChambeau','Fitzpatrick','Aberg','Young'] },
  { owner:'Keith Simpson', golfers:['Scheffler','McIlroy','Rahm','Schauffele'] },
  { owner:'Chad Hess 1', golfers:['DeChambeau','Schauffele','Spieth','Bridgeman'] },
  { owner:'Brendan Glavin', golfers:['Scheffler','DeChambeau','Matsuyama','Rose'] },
  { owner:'Nate Wood', golfers:['Scheffler','Schauffele','Aberg','Rahm'] },
  { owner:'Paul Arns', golfers:['Scheffler','Smith','Spieth','Fitzpatrick'] },
  { owner:'Jim McEnerny 1', golfers:['Scheffler','McIlroy','Schauffele','Rahm'] },
  { owner:'Jimmy Trinh 1', golfers:['DeChambeau','Rahm','Aberg','Fitzpatrick'] },
  { owner:'Dillon Kirland', golfers:['Scheffler','Schauffele','DeChambeau','Rahm'] },
  { owner:'Greg Carnivale 2', golfers:['Scheffler','Schauffele','Aberg','Rahm'] },
  { owner:'Jimmy Trinh 2', golfers:['Scheffler','Rahm','DeChambeau','McIlroy'] },
  { owner:'Dan Chudd', golfers:['Scheffler','DeChambeau','Aberg','Fleetwood'] },
  { owner:'Derek Toman', golfers:['DeChambeau','Aberg','Rose','Fleetwood'] },
  { owner:'Chad Hess 2', golfers:['DeChambeau','Rose','Fitzpatrick','Schauffele'] },
  { owner:'Cesar Santana', golfers:['Rahm','Schauffele','Young','MacIntyre'] },
  { owner:'Matt Wesmiller 2', golfers:['Scheffler','Aberg','Bhatia','DeChambeau'] },
  { owner:'Michael Cooper', golfers:['Scheffler','DeChambeau','Rahm','Rose'] },
  { owner:'Rick Philbin', golfers:['Scheffler','McIlroy','DeChambeau','Rahm'] },
  { owner:'Brian Bateh 1', golfers:['Scheffler','DeChambeau','McIlroy','Rahm'] },
  { owner:'Joe Greiner 2', golfers:['DeChambeau','Schauffele','Rahm','Young'] },
  { owner:'Chris Cook 1', golfers:['Scheffler','Aberg','Schauffele','Young'] },
  { owner:'Marquis Green', golfers:['DeChambeau','Bridgeman','Schauffele','Rahm'] },
  { owner:'Michael Paluzzi', golfers:['Scheffler','McIlroy','DeChambeau','Rahm'] },
  { owner:'Ash Johnston', golfers:['DeChambeau','Reed','Fitzpatrick','Schauffele'] },
  { owner:'Chris Meighan', golfers:['Rose','Fleetwood','Aberg','Hovland'] },
  { owner:'Jack McCrery', golfers:['DeChambeau','Rahm','Fleetwood','Reed'] },
  { owner:'Musa Farmand', golfers:['Scheffler','DeChambeau','Rahm','Schauffele'] },
  { owner:'Eric Glowniak', golfers:['Scheffler','Aberg','Schauffele','Conners'] },
  { owner:'Greg Carnivale 1', golfers:['Scheffler','McIlroy','Rahm','DeChambeau'] },
  { owner:'Jason Paul', golfers:['DeChambeau','Rose','Aberg','McIlroy'] },
  { owner:'Jim McEnerny 2', golfers:['Scheffler','DeChambeau','Matsuyama','Young'] },
  { owner:'Chris Kemph', golfers:['Scheffler','McIlroy','DeChambeau','Cantlay'] },
  { owner:'Brian Hegenbart 1', golfers:['DeChambeau','Schauffele','Aberg','Gotterup'] },
  { owner:'Matt Wesmiller 1', golfers:['DeChambeau','Schauffele','Fitzpatrick','Reed'] },
];

async function runSync() {
  const line = document.getElementById('statusLine');
  line.innerText = "Attempting to link with Augusta...";
  
  let rawData = null;
  for (let proxy of PROXIES) {
    try {
      const resp = await fetch(proxy + encodeURIComponent(ESPN_URL + '&t=' + Date.now()));
      if (!resp.ok) continue;
      const json = await resp.json();
      // Handle the data variance (AllOrigins string vs others direct object)
      const contents = (proxy.includes('allorigins')) ? json.contents : json;
      rawData = (typeof contents === 'string') ? JSON.parse(contents) : contents;
      if (rawData && rawData.events) break;
    } catch (e) { console.warn("Proxy failed, trying next..."); }
  }

  if (!rawData) {
    line.innerText = "Sync Error: Local connection blocked or proxies offline.";
    return;
  }

  try {
    const athletes = rawData.events[0].competitions[0].competitors;
    const leaderboard = athletes.map(p => {
      // THE SCOTTIE FIX: Target 'toPar' statistic specifically for -7
      const stats = p.statistics || [];
      const parStat = stats.find(s => s.name === "toPar" || s.name === "totalRelPar");
      const score = parStat ? parStat.displayValue : (p.score?.displayValue || 'E');
      
      const s = p.status || {};
      const isMC = s.type?.name?.toLowerCase().includes('cut') || s.type?.name?.toLowerCase().includes('mc');

      return {
        fullName: p.athlete.displayName,
        lName: (p.athlete.lastName || "").toLowerCase(),
        score: score,
        strokes: p.score?.value || 0,
        pos: p.position?.displayValue || '--',
        thru: s.thru || 'F',
        isMC: isMC
      };
    });

    // Manual Ranking
    const active = leaderboard.filter(a => !a.isMC).sort((a,b) => a.strokes - b.strokes);
    let r = 1;
    active.forEach((a, i) => {
      if (i > 0 && a.strokes !== active[i-1].strokes) r = i + 1;
      a.calcRank = r;
      if (a.pos === '--') a.pos = 'T' + r;
    });
    leaderboard.forEach(a => { if(a.isMC) a.calcRank = 63; });

    // Simplified Entry Mapping (Last Name Only)
    const scored = ENTRIES.map(e => {
      const gData = e.golfers.map(search => {
        const match = leaderboard.find(p => p.lName === search.toLowerCase().trim() || p.fullName.includes(search));
        return match ? {...match} : {fullName: search, score: '??', pos: '--', thru: '--', calcRank: 99};
      });
      return { owner: e.owner, golfers: gData, total: gData.reduce((s,g) => s + g.calcRank, 0) };
    });

    render(scored.sort((a,b) => a.total - b.total));
    line.innerText = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (err) {
    line.innerText = "Sync Error: API structure changed.";
    console.error(err);
  }
}

function render(data) {
  let html = '<table><thead><tr><th>Rank</th><th>Entry</th><th>Golfer 1</th><th>Golfer 2</th><th>Golfer 3</th><th>Golfer 4</th><th style="text-align:center">Total</th></tr></thead><tbody>';
  data.forEach((e, i) => {
    const tied = i > 0 && e.total === data[i-1].total;
    html += `<tr>
      <td class="rank-col">${tied ? '' : (i+1)}</td>
      <td class="owner-col">${e.owner}</td>
      ${e.golfers.map(g => `
        <td>
          <span class="g-name ${g.isMC?'is-mc':''}">${g.fullName}</span>
          <span class="g-score ${g.isMC?'is-mc':''}">${g.isMC ? 'MC' : g.score + ' · ' + g.thru}</span>
          <span class="g-pos ${g.isMC?'is-mc':''}">${g.isMC ? 'CUT' : g.pos}</span>
        </td>
      `).join('')}
      <td class="total-col">${e.total}</td>
    </tr>`;
  });
  document.getElementById('board').innerHTML = html + '</tbody></table>';
}

runSync();
setInterval(runSync, 120000);
</script>
</body>
</html>

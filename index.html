    td.owner { font-weight:600; color:var(--white); width:180px; font-size:1.2rem; }
    td.place-total { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:700; text-align:center; color:var(--gold); width:110px; }
    td.prize { font-size:1.15rem; text-align:center; color:var(--gold-light); font-weight:600; width:120px; }

    .golfer-name { font-size:1.15rem; color:var(--white); display:block; font-weight:500; margin-bottom:6px; white-space: nowrap; }
    .golfer-stats { display:flex; align-items:center; gap:10px; }
    .g-score { font-size:1.15rem; font-weight:700; font-family:'Playfair Display',serif; min-width:36px; }
    .g-score.under { color:#81c784; }
    .g-score.over  { color:#e57373; }
    .g-score.even  { color:var(--cream-dark); }
    .g-thru { font-size:1.1rem; color:rgba(245,240,228,.5); font-weight: 300; min-width: 25px; text-align: center; }
    .g-pos { font-size:.95rem; padding:4px 10px; border-radius:3px; font-weight:700; min-width: 44px; text-align: center; }

const PAYOUTS = { 1:1982, 2:1068, 3:300, 4:150 };
const MC_SCORE = 58;
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';

// ═══════════════════════════════════════════════════
//  DATA ENGINE
// ═══════════════════════════════════════════════════

function parseScoreNumeric(s) {
  if (s === 'E' || s === 'Even' || s === '0') return 0;
  if (!s || s === '--') return 999;
  return parseInt(s.replace('+', '')) || 0;
}

function parseESPN(data) {
  const rawPlayers = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!rawPlayers.length) throw new Error('API Sync Failed');

  let athletes = rawPlayers.filter(p => p.athlete).map(p => {
    const s = p.status || {};
    const type = s.type?.name?.toLowerCase() || "";
    const scoreStr = p.score?.displayValue || 'E';
    
    // STRICT HOLE LOGIC: NO "R1", NO TIMESTAMPS. NUMBER ONLY OR "F".
    let thruLabel = '1';
    if (type.includes('final') || s.thru === 18) {
      thruLabel = 'F';
    } else if (s.thru > 0) {
      thruLabel = String(s.thru);
    }

    return {
      id: p.id,
      name: p.athlete.displayName,
      firstName: (p.athlete.firstName || "").toLowerCase(),
      lastName: (p.athlete.lastName || "").toLowerCase(),
      scoreNum: parseScoreNumeric(scoreStr),
      scorePar: scoreStr,
      thru: thruLabel,
      isMC: type.includes('cut') || type.includes('mc') || type.includes('wd')
    };
  });

  const active = athletes.filter(a => !a.isMC).sort((a,b) => a.scoreNum - b.scoreNum);
  let currentRank = 1;
  for (let i = 0; i < active.length; i++) {
    if (i > 0 && active[i].scoreNum !== active[i-1].scoreNum) {
      currentRank = i + 1;
    }
    active[i].calculatedRank = currentRank;
    const tied = (i > 0 && active[i].scoreNum === active[i-1].scoreNum) || 
                 (i < active.length - 1 && active[i].scoreNum === active[i+1].scoreNum);
    active[i].displayRank = (tied ? 'T' : '') + currentRank;
  }

  athletes.forEach(a => {
    if (a.isMC) {
      a.calculatedRank = MC_SCORE;
      a.displayRank = 'MC';
      a.thru = 'F';
    }
  });

  return athletes;
}

// STRICT MATCHING: Both First and Last must align exactly
function matchGolfer(entryName, lb) {
  const eParts = entryName.toLowerCase().split(/\s+/);
  const eFirst = eParts[0];
  const eLast = eParts[eParts.length - 1];

  return lb.find(p => {
    const firstMatch = p.firstName.includes(eFirst) || eFirst.includes(p.firstName);
    const lastMatch = p.lastName === eLast;
    return firstMatch && lastMatch;
  }) || null;
}

function calculateScores(lb) {
  return ALL_ENTRIES.map(entry => {
    const golfers = entry.golfers.map(gName => {
      const m = matchGolfer(gName, lb);
      if (!m) return { name:gName, displayRank:'--', calculatedRank:99, thru:'--', scorePar:'E', isMC:false };
      return { ...m };
    });
    return { owner: entry.owner, golfers, total: golfers.reduce((s, g) => s + g.calculatedRank, 0) };
  });
}

// ═══════════════════════════════════════════════════
//  FETCH & UI
// ═══════════════════════════════════════════════════

async function fetchWithFailover() {
  const t = Date.now();
  const url = `${ESPN_URL}&t=${t}`; 
  const proxies = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/get?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];

  for (const proxy of proxies) {
    try {
      const fullUrl = proxy + encodeURIComponent(url);
      const resp = await fetch(fullUrl, { cache: 'no-store' });
      if (!resp.ok) continue;
      
      let data = await resp.json();
      if (data.contents) data = JSON.parse(data.contents);
      
      return parseESPN(data);
    } catch(e) { console.warn('Rotating Proxy...'); }
  }
  throw new Error('Offline');
}

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot wait';
  txt.textContent = 'Syncing...';
  try {
    const athletes = await fetchWithFailover();
    const scored = calculateScores(athletes);
    const ranked = scored.sort((a,b) => a.total - b.total);
    render(ranked);
    dot.className = 'dot live';
    txt.textContent = 'Live Data';
    document.getElementById('lastUpdated').textContent = 'Synced: ' + new Date().toLocaleTimeString();
  } catch(e) {
    dot.className = 'dot';
    txt.textContent = 'Signal Offline';
  }
}

function render(ranked) {
  const rows = ranked.map((e, idx) => {
    const currentPlace = (idx > 0 && e.total === ranked[idx-1].total) ? ranked[idx-1].place : idx + 1;
    e.place = currentPlace;

    const golfersHtml = e.golfers.map(g => {
      const sClass = g.scorePar.startsWith('-') ? 'under' : g.scorePar === 'E' ? 'even' : 'over';
      const pClass = g.isMC ? 'mc' : 'active';
      return `<td>
        <span class="golfer-name">${g.name}</span>
        <div class="golfer-stats">
          <span class="g-score ${sClass}">${g.scorePar}</span>
          <span class="g-thru">${g.thru}</span>
          <span class="g-pos ${pClass}">${g.displayRank}</span>
        </div>
      </td>`;
    }).join('');

    const tiedCount = ranked.filter(x => x.total === e.total).length;
    let prizeStr = '';
    if (e.place <= 4) {
      let totalPot = 0;
      for (let i = 0; i < tiedCount; i++) { totalPot += (PAYOUTS[e.place + i] || 0); }
      const share = Math.round(totalPot / tiedCount);
      prizeStr = share > 0 ? '$' + share.toLocaleString() : '';
    }

    return `<tr class="${e.place === 1 ? 'rank-1' : ''}">
      <td class="rank">${e.place}</td>
      <td class="owner">${e.owner}</td>
      ${golfersHtml}
      <td class="place-total">${e.total}</td>
      <td class="prize">${prizeStr}</td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `<div class="table-wrap"><table><thead><tr><th>Rank</th><th>Entry</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th style="text-align:center">Total</th><th style="text-align:center">Prize</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

loadAll();
setInterval(loadAll, 120000);
</script>

const PAYOUTS = { 1:1982, 2:1068, 3:300, 4:150 };
const MC_SCORE = 58;
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';
const CACHE_KEY = 'mastersPoolLeaderboardCache_v2';

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function normalizeName(str) {
  return (str || '')
    .toLowerCase()
    .replace(/\./g, '')
    .replace(/'/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function parseScoreNumeric(s) {
  if (s === 'E' || s === 'Even' || s === '0') return 0;
  if (!s || s === '--') return 999;
  return parseInt(String(s).replace('+', ''), 10) || 0;
}

function saveCache(athletes) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ timestamp: Date.now(), athletes }));
  } catch (e) {
    console.warn('Cache save failed', e);
  }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function formatClockValue(value) {
  if (!value) return '--';
  if (typeof value === 'string' && /\b\d{1,2}:\d{2}\s?(AM|PM)\b/i.test(value)) {
    return value.replace(/\s+/g, ' ').trim();
  }
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return '--';
  return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function getPlayStatus(player) {
  const s = player.status || {};
  const typeName = (s.type?.name || '').toLowerCase();
  const state = (s.type?.state || '').toLowerCase();
  const detail = (s.type?.detail || '').toLowerCase();
  const shortDetail = s.shortDetail || '';
  const displayClock = s.displayClock || '';
  const thru = Number(s.thru || 0);

  if (typeName.includes('cut') || typeName.includes('mc') || typeName.includes('wd')) return 'F';
  if (typeName.includes('final') || detail.includes('final') || thru >= 18) return 'F';
  if (thru > 0) return String(thru);

  const preferredTime = displayClock || shortDetail || player.teeTime || player.startTime || player.date;
  if (preferredTime && (state === 'pre' || typeName.includes('scheduled') || typeName.includes('pregame') || thru === 0)) {
    const formatted = formatClockValue(preferredTime);
    if (formatted !== '--') return formatted;
    if (typeof preferredTime === 'string' && preferredTime.length <= 12) return preferredTime;
  }

  return 'F';
}

function parseESPN(data) {
  const rawPlayers = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!rawPlayers.length) throw new Error('API Sync Failed');

  const athletes = rawPlayers.filter(p => p.athlete).map(p => {
    const s = p.status || {};
    const type = (s.type?.name || '').toLowerCase();
    const scoreStr = p.score?.displayValue || 'E';

    return {
      id: p.id,
      name: p.athlete.displayName,
      firstName: normalizeName(p.athlete.firstName || ''),
      lastName: normalizeName(p.athlete.lastName || ''),
      scoreNum: parseScoreNumeric(scoreStr),
      scorePar: scoreStr,
      thru: getPlayStatus(p),
      isMC: type.includes('cut') || type.includes('mc') || type.includes('wd')
    };
  });

  const active = athletes.filter(a => !a.isMC).sort((a,b) => a.scoreNum - b.scoreNum);
  let currentRank = 1;
  for (let i = 0; i < active.length; i++) {
    if (i > 0 && active[i].scoreNum !== active[i - 1].scoreNum) currentRank = i + 1;
    active[i].calculatedRank = currentRank;
    const tied = (i > 0 && active[i].scoreNum === active[i - 1].scoreNum) ||
                 (i < active.length - 1 && active[i].scoreNum === active[i + 1].scoreNum);
    active[i].displayRank = (tied ? 'T' : '') + currentRank;
  }

  athletes.forEach(a => {
    if (a.isMC) {
      a.calculatedRank = MC_SCORE;
      a.displayRank = 'MC';
      a.thru = 'F';
    }
  });

  return athletes;
}

function matchGolfer(entryName, leaderboard) {
  const normalized = normalizeName(entryName);
  const eParts = normalized.split(/\s+/);
  const eFirst = eParts[0] || '';
  const eLast = eParts[eParts.length - 1] || '';

  return leaderboard.find(p => {
    const firstMatch = p.firstName === eFirst || p.firstName.includes(eFirst) || eFirst.includes(p.firstName);
    const lastMatch = p.lastName === eLast;
    return firstMatch && lastMatch;
  }) || null;
}

function validateEntries(entries) {
  const issues = [];
  for (const entry of entries) {
    if (entry.golfers.length !== 4) issues.push(`${entry.owner}: does not have exactly 4 golfers`);
    const normalizedGolfers = entry.golfers.map(normalizeName);
    if (new Set(normalizedGolfers).size !== normalizedGolfers.length) {
      issues.push(`${entry.owner}: duplicate golfer in entry`);
    }
  }
  if (issues.length) console.warn('Entry validation issues:', issues);
}

function calculateScores(lb) {
  return ALL_ENTRIES.map(entry => {
    const golfers = entry.golfers.map(gName => {
      const m = matchGolfer(gName, lb);
      if (!m) {
        return { name:gName, displayRank:'--', calculatedRank:99, thru:'--', scorePar:'E', isMC:false };
      }
      return { ...m };
    });
    return {
      owner: entry.owner,
      golfers,
      total: golfers.reduce((sum, g) => sum + g.calculatedRank, 0)
    };
  });
}

async function fetchWithFailover() {
  const t = Date.now();
  const url = `${ESPN_URL}&t=${t}`;
  const proxies = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/get?url=',
    'https://api.codetabs.com/v1/proxy?quest='
  ];

  let lastError = null;
  for (const proxy of proxies) {
    try {
      const fullUrl = proxy + encodeURIComponent(url);
      const resp = await fetch(fullUrl, { cache: 'no-store' });
      if (!resp.ok) continue;
      let data = await resp.json();
      if (data.contents) data = JSON.parse(data.contents);
      return parseESPN(data);
    } catch (e) {
      lastError = e;
      console.warn('Rotating Proxy...', e?.message || e);
    }
  }
  throw lastError || new Error('Offline');
}

function updateStatus({ live = false, stale = false, text = '', updatedAt = null, cacheText = '' } = {}) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  const lastUpdated = document.getElementById('lastUpdated');
  const cacheStatus = document.getElementById('cacheStatus');

  dot.className = 'dot';
  if (live) dot.classList.add('live');
  if (stale) dot.classList.add('stale');

  txt.textContent = text;
  lastUpdated.textContent = updatedAt ? ('Synced: ' + new Date(updatedAt).toLocaleTimeString()) : '';
  cacheStatus.textContent = cacheText;
}

function getThruClass(value) {
  if (value === 'F') return 'done';
  if (/^\d+$/.test(String(value))) return 'live-hole';
  if (/\b\d{1,2}:\d{2}\s?(AM|PM)\b/i.test(String(value))) return 'tee-time';
  return '';
}

function render(ranked) {
  const countsByTotal = ranked.reduce((acc, row) => {
    acc[row.total] = (acc[row.total] || 0) + 1;
    return acc;
  }, {});

  let prevTotal = null;
  let prevPlace = 0;

  const rows = ranked.map((e, idx) => {
    const place = e.total === prevTotal ? prevPlace : idx + 1;
    prevTotal = e.total;
    prevPlace = place;

    const golfersHtml = e.golfers.map(g => {
      const scoreVal = String(g.scorePar || 'E');
      const sClass = scoreVal.startsWith('-') ? 'under' : scoreVal === 'E' ? 'even' : 'over';
      const pClass = g.isMC ? 'mc' : (g.displayRank === '--' ? 'pending' : 'active');
      return `<td>
        <span class="golfer-name">${escapeHtml(g.name)}</span>
        <div class="golfer-stats">
          <span class="g-score ${sClass}">${escapeHtml(scoreVal)}</span>
          <span class="g-thru ${getThruClass(g.thru)}">${escapeHtml(g.thru)}</span>
          <span class="g-pos ${pClass}">${escapeHtml(g.displayRank)}</span>
        </div>
      </td>`;
    }).join('');

    const tiedCount = countsByTotal[e.total] || 1;
    let prizeStr = '';
    if (place <= 4) {
      let totalPot = 0;
      for (let i = 0; i < tiedCount; i++) totalPot += (PAYOUTS[place + i] || 0);
      const share = Math.round(totalPot / tiedCount);
      prizeStr = share > 0 ? '$' + share.toLocaleString() : '';
    }

    return `<tr class="${place === 1 ? 'rank-1' : ''}">
      <td class="rank">${place}</td>
      <td class="owner">${escapeHtml(e.owner)}</td>
      ${golfersHtml}
      <td class="place-total">${e.total}</td>
      <td class="prize">${prizeStr}</td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Entry</th>
            <th>G1</th>
            <th>G2</th>
            <th>G3</th>
            <th>G4</th>
            <th style="text-align:center">Total</th>
            <th style="text-align:center">Prize</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function loadAll() {
  updateStatus({ text: 'Syncing...' });
  try {
    const athletes = await fetchWithFailover();
    saveCache(athletes);
    const ranked = calculateScores(athletes).sort((a, b) => a.total - b.total);
    render(ranked);
    updateStatus({
      live: true,
      text: 'Live Data',
      updatedAt: Date.now(),
      cacheText: 'Fresh ESPN sync'
    });
  } catch (e) {
    const cache = loadCache();
    if (cache?.athletes?.length) {
      const ranked = calculateScores(cache.athletes).sort((a, b) => a.total - b.total);
      render(ranked);
      updateStatus({
        stale: true,
        text: 'Showing Cached Data',
        updatedAt: cache.timestamp,
        cacheText: 'Latest fetch failed'
      });
    } else {
      updateStatus({ text: 'Signal Offline' });
      document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:100px;color:var(--gold); font-size:1.3rem;">Unable to reach ESPN and no cached data is available.</div>';
    }
  }
}

validateEntries(ALL_ENTRIES);
loadAll();
setInterval(loadAll, 120000);
</script>

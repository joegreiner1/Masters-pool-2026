const MC_PENALTY_OFFSET = 8;
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';

// ═══════════════════════════════════════════════════
//  CORE ENGINE
// ═══════════════════════════════════════════════════

function norm(s) {
  return (s || "").toString().toLowerCase().trim();
}

function parseScore(val, display) {
  if (val !== undefined && val !== null) {
    const n = parseInt(val);
    if (!isNaN(n) && n < 100) return n;
  }
  const d = (display || "E").toLowerCase();
  if (d === 'e' || d === 'even' || d === '0') return 0;
  return parseInt(d.replace('+', '')) || 0;
}

function parseESPN(data) {
  const players = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!players.length) throw new Error("Leaderboard Empty");

  const athletes = players.map(p => {
    const s = p.status || {};
    const type = s.type?.name?.toLowerCase() || "";
    const isMC = type.includes('cut') || type.includes('mc') || type.includes('wd') || s.type?.id == "3";
    
    // Targeted Change 1: Prioritize displayValue for score to par (e.g., "-6")
    const scorePar = p.score?.displayValue || 'E';
    const scoreNum = parseScore(p.score?.value, p.score?.displayValue);
    
    // Position string extraction
    const posStr = p.position?.displayValue || '--';

    return {
      name: p.athlete?.displayName || "Unknown",
      scoreNum: scoreNum,
      scorePar: scorePar,
      displayPos: posStr,
      thru: (type.includes('final') || s.thru === 18) ? 'F' : (s.thru || '1'),
      status: isMC ? 'mc' : (type.includes('final') || s.thru === 18 ? 'complete' : 'active')
    };
  });

  const active = athletes.filter(a => a.status !== 'mc').sort((a,b) => a.scoreNum - b.scoreNum);
  let rank = 1;
  active.forEach((a, i) => {
    if (i > 0 && a.scoreNum !== active[i-1].scoreNum) rank = i + 1;
    a.calcRank = rank;
  });

  const finishers = active.length;
  athletes.forEach(a => { if (a.status === 'mc') a.calcRank = finishers + 1 + MC_PENALTY_OFFSET; });

  return athletes;
}

function matchGolfer(entryName, lb) {
  const target = ALIASES[norm(entryName)] || norm(entryName);
  return lb.find(p => norm(p.name) === target || norm(p.name).includes(target) || target.includes(norm(p.name))) || null;
}

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot';
  txt.textContent = 'Syncing...';

  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(ESPN_URL + '&t=' + Date.now());
    const resp = await fetch(proxy);
    const json = await resp.json();
    const data = JSON.parse(json.contents);
    const leaderboard = parseESPN(data);

    const scored = ALL_ENTRIES.map(entry => {
      const golfers = entry.golfers.map(gName => {
        const m = matchGolfer(gName, leaderboard);
        return m ? { ...m, entryName: gName } : { entryName: gName, status: 'pending', calcRank: 99, scorePar: '??', displayPos: '--', thru: '--' };
      });
      return { owner: entry.owner, golfers, total: golfers.reduce((s, g) => s + g.calcRank, 0) };
    });

    render(scored.sort((a,b) => a.total - b.total));
    dot.className = 'dot live';
    txt.textContent = 'Live Data';
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
    txt.textContent = 'Sync Offline';
  }
}

// Targeted Change 2: Format as Position · Score · Hole
function posLabel(g) {
  if (g.status === 'mc') return 'MC';
  if (g.status === 'pending') return '—';
  return `${g.displayPos} · ${g.scorePar} · ${g.thru}`;
}

function render(data) {
  const rows = data.map((e, i) => {
    const tied = i > 0 && e.total === data[i-1].total;
    return `<tr class="${i === 0 ? 'rank-1' : ''}">
      <td class="rank">${tied ? '' : (i + 1)}</td>
      <td class="owner">${e.owner}</td>
      ${e.golfers.map(g => `
        <td>
          <span class="golfer-name">${g.entryName}</span>
          <span class="golfer-badge ${g.status === 'mc' ? 'pos-mc' : 'pos-active'}">${posLabel(g)}</span>
        </td>
      `).join('')}
      <td class="total-score">${e.total}</td>
    </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Rank</th><th>Entry</th><th>Golfer 1</th><th>Golfer 2</th><th>Golfer 3</th><th>Golfer 4</th><th style="text-align:center">Total</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

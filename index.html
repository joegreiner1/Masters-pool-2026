    td.owner { font-weight: 600; color: var(--white); width: 160px; font-size: 1rem; }
    td.total-score { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--gold); width: 100px; }
    
    /* 3-Row Golfer Layout */
    .golfer-name { font-size: 0.95rem; color: var(--white); display: block; font-weight: 600; margin-bottom: 2px; }
    .golfer-score-hole { display: block; font-size: 0.85rem; color: var(--gold-light); margin-bottom: 2px; }
    .golfer-place { display: block; font-size: 0.8rem; color: rgba(245, 240, 228, 0.6); }

const MC_PENALTY_OFFSET = 8;
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';

// ═══════════════════════════════════════════════════
//  CORE LOGIC
// ═══════════════════════════════════════════════════

function norm(s) {
  return (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
}

// Targeted Change 1: Directly Extract Score to Par
function parseESPN(data) {
  const players = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!players.length) throw new Error("Leaderboard Empty");

  const athletes = players.map(p => {
    const s = p.status || {};
    const type = s.type?.name?.toLowerCase() || "";
    const isMC = type.includes('cut') || type.includes('mc') || type.includes('wd') || s.type?.id == "3";
    
    // THE FIX: Use displayValue for the tournament total (e.g. -6).
    // During an active round, ESPN prioritizes the tournament par in this string.
    const scoreToPar = p.score?.displayValue || 'E';
    
    // We still use value for sorting/rank calculations
    const scoreValue = p.score?.value || 0;

    return {
      name: p.athlete?.displayName || "Unknown",
      scoreToPar: scoreToPar,
      scoreValue: scoreValue,
      position: p.position?.displayValue || '--',
      thru: (type.includes('final') || s.thru === 18) ? 'F' : (s.thru || '1'),
      status: isMC ? 'mc' : 'active'
    };
  });

  // Sort active players by score value to calculate individual rank
  const active = athletes.filter(a => a.status !== 'mc').sort((a,b) => a.scoreValue - b.scoreValue);
  let rank = 1;
  active.forEach((a, i) => {
    if (i > 0 && a.scoreValue !== active[i-1].scoreValue) rank = i + 1;
    a.calcRank = rank;
  });

  // Calculate MC Rank based on total field size
  const finishers = active.length;
  athletes.forEach(a => { if (a.status === 'mc') a.calcRank = finishers + 1 + MC_PENALTY_OFFSET; });

  return athletes;
}

function matchGolfer(entryName, lb) {
  const target = ALIASES[norm(entryName)] || norm(entryName);
  return lb.find(p => norm(p.name) === target || norm(p.name).includes(target) || target.includes(norm(p.name))) || null;
}

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot';
  txt.textContent = 'Syncing...';

  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(ESPN_URL + '&t=' + Date.now());
    const resp = await fetch(proxy);
    const json = await resp.json();
    const data = JSON.parse(json.contents);
    const leaderboard = parseESPN(data);

    const scored = ALL_ENTRIES.map(entry => {
      const golfers = entry.golfers.map(gName => {
        const m = matchGolfer(gName, leaderboard);
        return m ? { ...m, entryName: gName } : { entryName: gName, status: 'pending', calcRank: 99, scoreToPar: '??', position: '--', thru: '--' };
      });
      return { owner: entry.owner, golfers, total: golfers.reduce((s, g) => s + g.calcRank, 0) };
    });

    render(scored.sort((a,b) => a.total - b.total));
    dot.className = 'dot live';
    txt.textContent = 'Live • Round 3';
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
    txt.textContent = 'Sync Offline';
  }
}

// Targeted Change 2: 3-Row Display with Correct Data
function render(data) {
  const rows = data.map((e, i) => {
    const tied = i > 0 && e.total === data[i-1].total;
    const golferCells = e.golfers.map(g => `
      <td>
        <span class="golfer-name ${g.status === 'mc' ? 'is-mc' : ''}">${g.entryName}</span>
        <span class="golfer-score-hole ${g.status === 'mc' ? 'is-mc' : ''}">${g.scoreToPar} · ${g.thru}</span>
        <span class="golfer-place ${g.status === 'mc' ? 'is-mc' : ''}">${g.position}</span>
      </td>`).join('');

    return `
      <tr class="${i === 0 ? 'rank-1' : ''}">
        <td class="rank">${tied ? '' : (i + 1)}</td>
        <td class="owner">${e.owner}</td>
        ${golferCells}
        <td class="total-score">${e.total}</td>
      </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Rank</th><th>Entry</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th style="text-align:center">Total</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

loadAll();
setInterval(loadAll, 120000);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Pool 2026</title>
  <style>
    :root {
      --green: #0d2e1e;
      --gold: #c9a84c;
      --cream: #f5f0e4;
      --white: #ffffff;
      --red: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--green);
      color: var(--cream);
      font-family: Georgia, serif;
      margin: 0;
      padding: 15px;
    }
    header {
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,.5);
      padding-bottom: 18px;
      margin-bottom: 12px;
    }
    h1 { color: var(--white); margin: 0; font-size: clamp(1.6rem, 5vw, 2.4rem); }
    .subhead { font-size: .95rem; margin-top: 6px; color: var(--gold); }
    .status {
      text-align: center;
      padding: 10px 12px;
      color: var(--gold);
      font-size: .85rem;
      min-height: 1.2rem;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    button {
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font: inherit;
    }
    main { max-width: 1200px; margin: 0 auto; overflow-x: auto; }
    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: rgba(0,0,0,.18);
    }
    th {
      border-bottom: 2px solid var(--gold);
      padding: 10px;
      text-align: left;
      font-size: .72rem;
      text-transform: uppercase;
      color: var(--gold);
      letter-spacing: .06em;
    }
    td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      vertical-align: top;
    }
    .rank { font-weight: bold; color: var(--gold); text-align: center; width: 46px; font-size: 1.1rem; }
    .owner { font-weight: 600; color: var(--white); width: 155px; }
    .g-name { display: block; font-weight: 600; color: var(--white); margin-bottom: 2px; }
    .g-score { display: block; color: var(--gold); font-size: .85rem; }
    .g-pos { display: block; opacity: .65; font-size: .8rem; font-style: italic; }
    .mc { color: var(--red) !important; }
    .total { font-size: 1.45rem; color: var(--gold); font-weight: bold; text-align: center; }
    .note {
      max-width: 1200px;
      margin: 14px auto 0;
      font-size: .82rem;
      opacity: .85;
      line-height: 1.4;
    }
    @media (max-width: 700px) {
      body { padding: 10px; }
      .status, .note { font-size: .8rem; }
      button { width: 100%; max-width: 260px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Masters Pool 2026</h1>
    <div class="subhead">In Memory of Geoff Martyn</div>
  </header>

  <div class="controls">
    <button id="refreshBtn">Reload scores.json</button>
  </div>

  <div class="status" id="statusLine">Loading local scores...</div>

  <main id="board">
    <div style="text-align:center; padding:80px 20px; color:var(--gold);">⛳ Loading leaderboard...</div>
  </main>

  <div class="note">
    This version loads from <strong>scores.json</strong> in the same GitHub Pages folder. It avoids browser proxy sync entirely so the page keeps working even when live feeds do not.
  </div>

<script>
const MC_SCORE = 63;

const ENTRIES = [
  { owner:'Gary Mann', golfers:['Scheffler','Rose','Young','Fleetwood'] },
  { owner:'Joe Greiner 1', golfers:['Scheffler','Fleetwood','Fitzpatrick','Reed'] },
  { owner:'Matt Maher', golfers:['Scheffler','Aberg','Young','Fleetwood'] },
  { owner:'Chris Madison 2', golfers:['Young','Schauffele','Rose','McIlroy'] },
  { owner:'Chris Haddock', golfers:['Scheffler','McIlroy','Scott','Day'] },
  { owner:'Brian Bateh 2', golfers:['Scheffler','Young','Spieth','Morikawa'] },
  { owner:'Nick Canatsey', golfers:['Young','Fitzpatrick','Schauffele','Rose'] },
  { owner:'Jeremy Malcolm 1', golfers:['Scheffler','McIlroy','Young','Spaun'] },
  { owner:'Vince Caporuscio', golfers:['Schauffele','Young','McIlroy','Aberg'] },
  { owner:'Chris Madison 3', golfers:['Scheffler','Rahm','Bridgeman','Young'] },
  { owner:'Bill Nunley', golfers:['Scheffler','McIlroy','Rahm','DeChambeau'] },
  { owner:'Amy Beth Roy', golfers:['Young','Schauffele','Aberg','McNealy'] },
  { owner:'Brian Hegenbart 3', golfers:['Scheffler','Aberg','DeChambeau','Young'] },
  { owner:'Gary Felice', golfers:['DeChambeau','Schauffele','Rahm','Im'] },
  { owner:'Dan Murphy', golfers:['Scheffler','Rahm','Reed','Schauffele'] },
  { owner:'Rob Salem', golfers:['DeChambeau','Young','Aberg','Fitzpatrick'] },
  { owner:'Dave Mornhinweg', golfers:['Fitzpatrick','Rahm','Bhatia','Schauffele'] },
  { owner:'KC Arns 2', golfers:['DeChambeau','McIlroy','Schauffele','Fleetwood'] },
  { owner:'Chris Madison 1', golfers:['DeChambeau','Fitzpatrick','Aberg','Young'] },
  { owner:'Keith Simpson', golfers:['Scheffler','McIlroy','Rahm','Schauffele'] },
  { owner:'Chad Hess 1', golfers:['DeChambeau','Schauffele','Spieth','Bridgeman'] },
  { owner:'Brendan Glavin', golfers:['Scheffler','DeChambeau','Matsuyama','Rose'] },
  { owner:'Nate Wood', golfers:['Scheffler','Schauffele','Aberg','Rahm'] },
  { owner:'Paul Arns', golfers:['Scheffler','Smith','Spieth','Fitzpatrick'] },
  { owner:'Jim McEnerny 1', golfers:['Scheffler','McIlroy','Schauffele','Rahm'] },
  { owner:'Jimmy Trinh 1', golfers:['DeChambeau','Rahm','Aberg','Fitzpatrick'] },
  { owner:'Dillon Kirland', golfers:['Scheffler','Schauffele','DeChambeau','Rahm'] },
  { owner:'Greg Carnivale 2', golfers:['Scheffler','Schauffele','Aberg','Rahm'] },
  { owner:'Jimmy Trinh 2', golfers:['Scheffler','Rahm','DeChambeau','McIlroy'] },
  { owner:'Dan Chudd', golfers:['Scheffler','DeChambeau','Aberg','Fleetwood'] },
  { owner:'Derek Toman', golfers:['DeChambeau','Aberg','Rose','Fleetwood'] },
  { owner:'Chad Hess 2', golfers:['DeChambeau','Rose','Fitzpatrick','Schauffele'] },
  { owner:'Cesar Santana', golfers:['Rahm','Schauffele','Young','MacIntyre'] },
  { owner:'Matt Wesmiller 2', golfers:['Scheffler','Aberg','Bhatia','DeChambeau'] },
  { owner:'Michael Cooper', golfers:['Scheffler','DeChambeau','Rahm','Rose'] },
  { owner:'Rick Philbin', golfers:['Scheffler','McIlroy','DeChambeau','Rahm'] },
  { owner:'Brian Bateh 1', golfers:['Scheffler','DeChambeau','McIlroy','Rahm'] },
  { owner:'Joe Greiner 2', golfers:['DeChambeau','Schauffele','Rahm','Young'] },
  { owner:'Chris Cook 1', golfers:['Scheffler','Aberg','Schauffele','Young'] },
  { owner:'Marquis Green', golfers:['DeChambeau','Bridgeman','Schauffele','Rahm'] },
  { owner:'Michael Paluzzi', golfers:['Scheffler','McIlroy','DeChambeau','Rahm'] },
  { owner:'Ash Johnston', golfers:['DeChambeau','Reed','Fitzpatrick','Schauffele'] },
  { owner:'Chris Meighan', golfers:['Rose','Fleetwood','Aberg','Hovland'] },
  { owner:'Jack McCrery', golfers:['DeChambeau','Rahm','Fleetwood','Reed'] },
  { owner:'Musa Farmand', golfers:['Scheffler','DeChambeau','Rahm','Schauffele'] },
  { owner:'Eric Glowniak', golfers:['Scheffler','Aberg','Schauffele','Conners'] },
  { owner:'Greg Carnivale 1', golfers:['Scheffler','McIlroy','Rahm','DeChambeau'] },
  { owner:'Jason Paul', golfers:['DeChambeau','Rose','Aberg','McIlroy'] },
  { owner:'Jim McEnerny 2', golfers:['Scheffler','DeChambeau','Matsuyama','Young'] },
  { owner:'Chris Kemph', golfers:['Scheffler','McIlroy','DeChambeau','Cantlay'] },
  { owner:'Brian Hegenbart 1', golfers:['DeChambeau','Schauffele','Aberg','Gotterup'] },
  { owner:'Matt Wesmiller 1', golfers:['DeChambeau','Schauffele','Fitzpatrick','Reed'] }
];

function normalize(text) {
  return (text || '')
    .toString()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z]/g, '');
}

function matchPlayer(search, leaderboard) {
  const needle = normalize(search);
  return leaderboard.find((p) => {
    const full = normalize(p.fullName);
    const last = normalize(p.lastName || '');
    return last === needle || full.includes(needle);
  });
}

function buildScores(leaderboard) {
  return ENTRIES.map((entry) => {
    const golfers = entry.golfers.map((search) => {
      const match = matchPlayer(search, leaderboard);
      if (match) return { ...match };
      return {
        fullName: search,
        lastName: search,
        score: '??',
        strokes: 999,
        pos: '--',
        thru: '--',
        isMC: false,
        calcRank: 99
      };
    });

    return {
      owner: entry.owner,
      golfers,
      total: golfers.reduce((sum, golfer) => sum + Number(golfer.calcRank || 99), 0)
    };
  }).sort((a, b) => a.total - b.total);
}

function render(data) {
  let html = '<table><thead><tr><th>Rank</th><th>Entry</th><th>Golfer 1</th><th>Golfer 2</th><th>Golfer 3</th><th>Golfer 4</th><th style="text-align:center">Total</th></tr></thead><tbody>';

  data.forEach((entry, index) => {
    const tied = index > 0 && entry.total === data[index - 1].total;
    const place = tied ? '' : (index + 1);

    html += `<tr>
      <td class="rank">${place}</td>
      <td class="owner">${entry.owner}</td>
      ${entry.golfers.map((g) => `
        <td>
          <span class="g-name ${g.isMC ? 'mc' : ''}">${g.fullName}</span>
          <span class="g-score ${g.isMC ? 'mc' : ''}">${g.isMC ? 'MC' : `${g.score} · ${g.thru}`}</span>
          <span class="g-pos ${g.isMC ? 'mc' : ''}">${g.isMC ? 'CUT' : g.pos}</span>
        </td>
      `).join('')}
      <td class="total">${entry.total}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('board').innerHTML = html;
}

async function loadLocalScores() {
  const statusLine = document.getElementById('statusLine');
  statusLine.textContent = 'Loading local scores...';

  try {
    const response = await fetch(`./scores.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!response.ok) throw new Error(`scores.json returned ${response.status}`);

    const payload = await response.json();
    if (!payload || !Array.isArray(payload.leaderboard)) {
      throw new Error('scores.json format is invalid');
    }

    const leaderboard = payload.leaderboard.map((p) => ({
      fullName: p.fullName,
      lastName: p.lastName || p.fullName.split(' ').slice(-1)[0],
      score: p.score ?? 'E',
      strokes: Number(p.strokes ?? 999),
      pos: p.pos ?? '--',
      thru: p.thru ?? '--',
      isMC: Boolean(p.isMC),
      calcRank: Number(p.calcRank ?? (p.isMC ? MC_SCORE : 99))
    }));

    render(buildScores(leaderboard));

    const updatedAt = payload.updatedAt ? `Last updated: ${payload.updatedAt}` : 'Loaded local scores';
    statusLine.textContent = `${updatedAt} • Source: scores.json`;
  } catch (error) {
    console.error(error);
    statusLine.textContent = 'Could not load scores.json. Make sure index.html and scores.json are in the same folder.';
    document.getElementById('board').innerHTML = '<div style="text-align:center; padding:80px 20px; color:var(--gold);">Unable to load scores.json</div>';
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadLocalScores);
loadLocalScores();
</script>
</body>
</html>

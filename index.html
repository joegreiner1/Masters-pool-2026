const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';

function norm(s) {
  return (s || "").toString().toLowerCase().trim();
}

/**
 * Targeted Change 1: parseESPN
 * Specifically hunts for 'toPar' in statistics to avoid the -2 round-score glitch.
 */
function parseESPN(data) {
  const players = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!players.length) throw new Error("Leaderboard data missing");

  const athletes = players.map(p => {
    try {
      const s = p.status || {};
      const type = s.type?.name?.toLowerCase() || "";
      const isMC = type.includes('cut') || type.includes('mc') || type.includes('wd') || s.type?.id == "3";
      
      // Extraction Fix: Prioritize 'toPar' statistic for the absolute tournament total (e.g. -6)
      const stats = p.statistics || [];
      const parStat = stats.find(stat => stat.name === "toPar" || stat.name === "totalRelPar");
      const scoreTournamentTotal = parStat ? parStat.displayValue : (p.score?.displayValue || 'E');
      
      const scoreValue = p.score?.value || 0; // strokes for rank logic
      const positionStr = p.position?.displayValue || '--';

      return {
        name: p.athlete?.displayName || "Unknown",
        scoreTournamentTotal: scoreTournamentTotal,
        scoreValue: scoreValue,
        position: positionStr,
        thru: (type.includes('final') || s.thru === 18) ? 'F' : (s.thru || '1'),
        status: isMC ? 'mc' : 'active'
      };
    } catch(e) { return null; }
  }).filter(x => x);

  // Manual Rank calculation to handle ties accurately
  const active = athletes.filter(a => a.status !== 'mc').sort((a,b) => a.scoreValue - b.scoreValue);
  let rank = 1;
  active.forEach((a, i) => {
    if (i > 0 && a.scoreValue !== active[i-1].scoreValue) rank = i + 1;
    a.calcRank = rank;
  });

  const finishers = active.length;
  athletes.forEach(a => { if (a.status === 'mc') a.calcRank = finishers + 1 + 8; });

  return athletes;
}

function matchGolfer(entryName, lb) {
  if (!entryName) return null;
  const target = ALIASES[norm(entryName)] || norm(entryName);
  const targetLast = target.split(' ').pop();
  
  return lb.find(p => norm(p.name) === target || norm(p.name).includes(targetLast)) || null;
}

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot';
  txt.textContent = 'Syncing...';

  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(ESPN_URL + '&t=' + Date.now());
    const resp = await fetch(proxy);
    if (!resp.ok) throw new Error("Network response failed");
    
    const json = await resp.json();
    const rawData = (typeof json.contents === 'string') ? JSON.parse(json.contents) : json.contents;
    const leaderboard = parseESPN(rawData);

    const scored = ALL_ENTRIES.map(entry => {
      const gList = entry.golfers.map(gName => {
        const m = matchGolfer(gName, leaderboard);
        return m ? { ...m, entryName: gName } : { entryName: gName, status: 'pending', calcRank: 99, scoreTournamentTotal: '??', position: '--', thru: '--' };
      });
      return { owner: entry.owner, golfers: gList, total: gList.reduce((s, g) => s + g.calcRank, 0) };
    });

    render(scored.sort((a,b) => a.total - b.total));
    dot.className = 'dot live';
    txt.textContent = 'Live • Round 3';
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
    txt.textContent = 'Sync Offline';
  }
}

/**
 * Targeted Change 2: render
 * Redesigned to show 3 rows of data per golfer with NO labels.
 */
function render(data) {
  const rows = data.map((e, i) => {
    const tied = i > 0 && e.total === data[i-1].total;
    const gCells = e.golfers.map(g => `
      <td>
        <span class="golfer-name ${g.status === 'mc' ? 'is-mc' : ''}">${g.entryName}</span>
        <span class="row-2-data ${g.status === 'mc' ? 'is-mc' : ''}">${g.scoreTournamentTotal} · ${g.thru}</span>
        <span class="row-3-data ${g.status === 'mc' ? 'is-mc' : ''}">${g.position}</span>
      </td>`).join('');

    return `
      <tr class="${i === 0 ? 'rank-1' : ''}">
        <td class="rank">${tied ? '' : (i + 1)}</td>
        <td class="owner">${e.owner}</td>
        ${gCells}
        <td class="total-score">${e.total}</td>
      </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Rank</th><th>Entry</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th style="text-align:center">Total</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

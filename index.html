    header { text-align:center; padding:30px 20px 20px; border-bottom:1px solid rgba(201,168,76,.25); }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4.5vw,2.8rem); font-weight:700; color:var(--white); letter-spacing:.04em; margin-bottom: 5px; }

    .status-bar { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; max-width:1100px; margin:15px auto 0; padding:10px 15px; background:rgba(26,84,54,.35); border:1px solid rgba(201,168,76,.15); border-radius:4px; }
    .status-pill { display:inline-flex; align-items:center; gap:7px; font-size:.75rem; letter-spacing:.06em; text-transform:uppercase; color:var(--cream-dark); }
    .dot { width:8px; height:8px; border-radius:50%; background:#aaa; }
    .dot.live  { background:#4caf50; box-shadow:0 0 6px #4caf50; animation:pulse 2s infinite; }
    .dot.wait  { background:var(--gold); }

    .refresh-btn { background:transparent; border:1px solid rgba(201,168,76,.4); color:var(--gold); padding:5px 12px; border-radius:3px; cursor:pointer; font-size:.75rem; text-transform:uppercase; transition: .2s; }
    .refresh-btn:hover { background:rgba(201,168,76,.12); }

    main { max-width:1100px; margin:0 auto; padding:20px 10px 60px; }

    .payout-item { font-size: 1rem; color: var(--gold-light); }

    .table-wrap { overflow-x:auto; border-radius:6px; border:1px solid rgba(201,168,76,.2); background: rgba(13, 46, 30, 0.4); }

    thead th { background:rgba(13,46,30,0.9); color:var(--gold); font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; padding:12px; text-align:left; border-bottom:1px solid rgba(201,168,76,0.3); }

    tbody tr:nth-child(even) { background:rgba(255,255,255,.02); }
    tbody tr.rank-1 { background:rgba(201,168,76,.1) !important; }
    td { padding:10px 12px; vertical-align:middle; }
    td.rank { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--gold); text-align:center; width:50px; }
    td.owner { font-weight:600; color:var(--white); width:140px; font-size:.9rem; }

    /* GOLFER CELL */
    .golfer-cell { min-width: 130px; }
    .golfer-name { font-size:.82rem; color:var(--white); display:block; font-weight:500; margin-bottom:4px; }
    .golfer-stats { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .g-score { font-size:.78rem; font-weight:700; font-family:'Playfair Display',serif; }
    .g-score.under { color: #81c784; }
    .g-score.over  { color: #e57373; }

const PAYOUTS = { 1: 1982, 2: 1068, 3: 300, 4: 150 };
const ESPN_URL = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';

// ═══════════════════════════════════════════════════
//  CORE FUNCTIONS
// ═══════════════════════════════════════════════════

async function fetchWithTimeout(url, ms) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return resp;
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function fetchESPN() {
  const urls = [
    ESPN_URL,
    'https://corsproxy.io/?' + encodeURIComponent(ESPN_URL),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(ESPN_URL)
  ];
  for (const url of urls) {
    try {
      const resp = await fetchWithTimeout(url, 8000);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      return parseESPN(data);
    } catch(e) {
      console.warn('Failed, trying next:', url, e.message);
    }
  }
  throw new Error('All sources failed. Please Refresh.');
}

function formatScore(raw) {
  // ESPN returns score to par as a number (negative = under par)
  if (raw === null || raw === undefined || raw === '') return 'E';
  const n = parseInt(raw);
  if (isNaN(n)) return String(raw); // already a string like "E"
  if (n === 0) return 'E';
  if (n < 0) return String(n);      // e.g. -5
  return '+' + n;                   // e.g. +2
}

function scoreClass(raw) {
  const n = parseInt(raw);
  if (isNaN(n) || n === 0) return 'even';
  return n < 0 ? 'under' : 'over';
}

function parseESPN(data) {
  const event = data?.events?.[0];
  const players = event?.competitions?.[0]?.competitors || [];

  if (!players.length) throw new Error("No players found in API.");

  const parsed = players.map(p => {
    const athlete = p?.athlete || {};
    const statusType = (p?.status?.type?.name || '').toLowerCase();
    const thru = p?.status?.thru;
    const teeTime = p?.status?.displayValue;

    let loc = '';
    let stat = 'active';

    if (statusType.includes('cut') || statusType.includes('mc')) { stat = 'mc'; loc = 'MC'; }
    else if (statusType.includes('wd')) { stat = 'wd'; loc = 'WD'; }
    else if (statusType.includes('final') || thru === 18) { stat = 'complete'; loc = 'F'; }
    else if (thru > 0) { loc = String(thru); }  // just the number, e.g. "14"
    else { stat = 'pending'; loc = teeTime || '--'; }

    const displayPos = p?.status?.position?.displayValue || '--';
    let numericPos = parseInt(displayPos.replace('T', '')) || p.sortOrder || 99;

    // Score to par — ESPN stores this as a number on p.score
    const rawScore = p?.score ?? p?.status?.score ?? null;

    return {
      name: athlete.displayName || 'Unknown',
      displayPos,
      numPos: numericPos,
      status: stat,
      thru: loc,
      score: rawScore
    };
  });

  const finisherCount = parsed.filter(p => p.status !== 'mc' && p.status !== 'wd').length;
  return { players: parsed, finisherCount };
}

function matchGolfer(name, leaderboard) {
  const n = name.toLowerCase().trim();
  const last = n.split(' ').pop();
  let match = leaderboard.find(p => p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase()));
  if (match) return match;
  return leaderboard.find(p => p.name.toLowerCase().endsWith(last));
}

function calculateScores(lb, fc) {
  return ALL_ENTRIES.map(entry => {
    const golfers = entry.golfers.map(gName => {
      const m = matchGolfer(gName, lb);
      if (!m) return { name: gName, status: 'pending', displayPos: '--', numPos: 99, scorePos: 99, thru: '--', score: null };
      let score = m.numPos;
      if (m.status === 'mc' || m.status === 'wd') score = fc + 10;
      return { ...m, scorePos: score };
    });
    const total = golfers.reduce((s, g) => s + g.scorePos, 0);
    return { owner: entry.owner, golfers, total };
  });
}

function rankEntries(entries) {
  const sorted = [...entries].sort((a,b) => a.total - b.total);
  return sorted.map((e, i) => {
    if (i > 0 && e.total === sorted[i-1].total) { e.rank = sorted[i-1].rank; e.tied = true; }
    else { e.rank = i + 1; e.tied = false; }
    return e;
  });
}

function prizeFor(rank, ranked) {
  if (rank > 4) return '';
  const tiedCount = ranked.filter(e => e.rank === rank).length;
  let totalPot = 0;
  for (let i = rank; i < rank + tiedCount; i++) { if (PAYOUTS[i]) totalPot += PAYOUTS[i]; }
  const share = Math.round(totalPot / tiedCount);
  return share > 0 ? '$' + share.toLocaleString() : '';
}

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot wait';
  txt.textContent = 'Syncing...';

  try {
    const data = await fetchESPN();
    const scored = calculateScores(data.players, data.finisherCount);
    const ranked = rankEntries(scored);
    render(ranked);
    dot.className = 'dot live';
    txt.textContent = 'Live';
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    dot.className = 'dot';
    txt.textContent = 'API Offline — tap Refresh';
    console.error(e);
  }
}

function golferCell(g) {
  const scoreStr = formatScore(g.score);
  const cls = scoreClass(g.score);
  const posClass = g.status === 'mc' ? 'pos-mc' : g.status === 'pending' ? 'pos-pending' : g.status === 'complete' ? 'pos-complete' : 'pos-active';
  const posLabel = g.displayPos === '--' ? 'R1' : g.displayPos;
  const thruLabel = g.status === 'mc' ? 'MC' : g.status === 'wd' ? 'WD' : (g.thru || '--');

  return `
    <td class="golfer-cell">
      <span class="golfer-name">${g.name}</span>
      <div class="golfer-stats">
        <span class="g-score ${cls}">${scoreStr}</span>
        <span class="g-divider">·</span>
        <span class="g-thru">${thruLabel}</span>
        <span class="g-divider">·</span>
        <span class="g-pos ${posClass}">${posLabel}</span>
      </div>
    </td>`;
}

function render(ranked) {
  const rows = ranked.map(e => {
    const golfersHtml = e.golfers.map(golferCell).join('');
    return `
      <tr class="${e.rank === 1 ? 'rank-1' : ''}">
        <td class="rank">${e.rank}</td>
        <td class="owner">${e.owner}</td>
        ${golfersHtml}
        <td class="total-score">${e.total}</td>
        <td class="prize">${prizeFor(e.rank, ranked)}</td>
      </tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Rank</th><th>Entry</th>
            <th>G1</th><th>G2</th><th>G3</th><th>G4</th>
            <th style="text-align:center">Score</th><th style="text-align:center">Prize</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

loadAll();
setInterval(loadAll, 300000);
</script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masters Pool 2026 — In Memory of Geoff Martyn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep: #0d2e1e; --green-mid: #1a5436; --gold: #c9a84c;
      --gold-light: #e2c47a; --cream: #f5f0e4; --white: #fdfbf6; --red: #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--green-deep); color: var(--cream);
      font-family: 'Cormorant Garamond', serif; font-size: 16px; min-height: 100vh;
      background-image: radial-gradient(ellipse at 20% 0%, rgba(45,122,80,.25) 0%, transparent 60%);
    }
    header { text-align: center; padding: 40px 20px; border-bottom: 1px solid rgba(201,168,76,.25); }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 5vw, 3rem); color: var(--white); }
    h1 span { color: var(--gold); }
    .memorial { margin-top: 15px; display: inline-block; border: 1px solid var(--gold); padding: 5px 15px; font-style: italic; color: var(--gold-light); }
    
    .status-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 20px auto; padding: 10px 20px; background: rgba(0,0,0,0.2); border-radius: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; background: #666; }
    .dot.live { background: #4caf50; box-shadow: 0 0 8px #4caf50; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    
    main { max-width: 1200px; margin: 0 auto; padding: 0 15px 50px; }
    .table-wrap { overflow-x: auto; border: 1px solid rgba(201,168,76,.3); border-radius: 8px; background: rgba(0,0,0,0.3); }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th { background: rgba(13,46,30,0.9); color: var(--gold); padding: 12px; text-align: left; text-transform: uppercase; font-size: 0.8rem; border-bottom: 1px solid var(--gold); }
    td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
    
    .rank-cell { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); font-weight: 700; text-align: center; }
    .owner-cell { font-weight: 600; color: var(--white); font-size: 1.1rem; width: 150px; }
    
    /* 3-Row Text Only Layout */
    .g-name { display: block; font-weight: 600; color: var(--white); font-size: 0.95rem; margin-bottom: 2px; }
    .g-score-hole { display: block; font-size: 0.85rem; color: var(--gold-light); margin-bottom: 2px; }
    .g-pos { display: block; font-size: 0.8rem; color: rgba(245,240,228,0.5); }
    
    .total-cell { font-family: 'Playfair Display', serif; font-size: 1.5rem; text-align: center; color: var(--gold); font-weight: 700; }
    .is-mc { color: var(--red) !important; opacity: 0.8; }
    .refresh-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
    footer { text-align: center; padding: 30px; color: rgba(245,240,228,0.2); font-size: 0.8rem; }
  </style>
</head>
<body>

<header>
  <h1>Masters Pool <span>2026</span></h1>
  <div style="text-transform:uppercase; letter-spacing:2px; margin-top:5px; font-size: 0.85rem;">Augusta National · April 9–12</div>
  <div class="memorial">In Memory of Geoff Martyn</div>
  <div class="status-bar">
    <div><span class="dot" id="statusDot"></span> <span id="statusText">Establishing Link...</span></div>
    <div id="lastUpdated" style="font-size: 0.75rem; color: var(--gold-light);"></div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

<main id="mainContent">
  <div style="text-align:center; padding:100px; color:var(--gold);">⛳ Synchronizing Leaderboard...</div>
</main>

<footer>Live scores via ESPN · MC Penalty: (Finishers+1)+8 · Lowest Combined Rank Wins</footer>

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
//  DATA ENGINE
// ═══════════════════════════════════════════════════

function norm(s) {
  return (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z]/g, "");
}

/**
 * TARGETED CHANGE 1: parseESPN
 * Prioritizes the "toPar" statistic from the API to ensure we get -6, not 144.
 */
function parseESPN(data) {
  const players = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!players.length) throw new Error("Empty Data");

  const athletes = players.map(p => {
    const s = p.status || {};
    const type = s.type?.name?.toLowerCase() || "";
    const isMC = type.includes('cut') || type.includes('mc') || type.includes('wd') || s.type?.id == "3";
    
    // THE FIX: Pull from statistics array for stable 'toPar' value
    const stats = p.statistics || [];
    const parStat = stats.find(stat => stat.name === "toPar" || stat.name === "totalRelPar");
    const scorePar = parStat ? parStat.displayValue : (p.score?.displayValue || 'E');
    
    // Keep strokes for internal rank sorting
    const strokes = p.score?.value || 0;

    return {
      name: p.athlete?.displayName || "Unknown",
      scorePar: scorePar,
      strokes: strokes,
      pos: p.position?.displayValue || '--',
      thru: (type.includes('final') || s.thru === 18) ? 'F' : (s.thru || '1'),
      status: isMC ? 'mc' : 'active'
    };
  });

  // Calculate Ranks from strokes to handle ties correctly
  const active = athletes.filter(a => a.status !== 'mc').sort((a,b) => a.strokes - b.strokes);
  let rank = 1;
  active.forEach((a, i) => {
    if (i > 0 && a.strokes !== active[i-1].strokes) rank = i + 1;
    a.calcRank = rank;
  });

  const mcScore = active.length + 1 + MC_OFFSET;
  athletes.forEach(a => { if (a.status === 'mc') a.calcRank = mcScore; });

  return athletes;
}

function matchGolfer(entryName, lb) {
  const target = norm(entryName);
  // Match by finding the athlete whose normalized name contains the entry name or vice versa
  return lb.find(p => {
    const apiName = norm(p.name);
    return apiName.includes(target) || target.includes(apiName);
  }) || null;
}

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot';
  txt.textContent = 'Syncing...';

  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(ESPN_URL + '&t=' + Date.now());
    const resp = await fetch(proxy);
    const json = await resp.json();
    const raw = (typeof json.contents === 'string') ? JSON.parse(json.contents) : json.contents;
    const leaderboard = parseESPN(raw);

    const scored = ALL_ENTRIES.map(entry => {
      const gList = entry.golfers.map(gName => {
        const m = matchGolfer(gName, leaderboard);
        return m ? { ...m, entryName: gName } : { entryName: gName, status: 'pending', calcRank: 99, scorePar: '??', pos: '--', thru: '--' };
      });
      return { owner: entry.owner, golfers: gList, total: gList.reduce((s, g) => s + g.calcRank, 0) };
    });

    render(scored.sort((a,b) => a.total - b.total));
    dot.className = 'dot live';
    txt.textContent = 'Live Data';
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error(e);
    txt.textContent = 'Sync Offline';
  }
}

/**
 * TARGETED CHANGE 2: render (3-Row Layout)
 * Displays Name / Score · Hole / Position
 */
function render(data) {
  const rows = data.map((e, i) => {
    const tied = i > 0 && e.total === data[i-1].total;
    const gHtml = e.golfers.map(g => `
      <td>
        <span class="g-name ${g.status === 'mc' ? 'is-mc' : ''}">${g.entryName}</span>
        <span class="g-score-hole ${g.status === 'mc' ? 'is-mc' : ''}">${g.status === 'mc' ? 'MC' : `${g.scorePar} · ${g.thru}`}</span>
        <span class="g-pos ${g.status === 'mc' ? 'is-mc' : ''}">${g.status === 'mc' ? 'CUT' : g.pos}</span>
      </td>`).join('');

    return `<tr class="${i === 0 ? 'rank-1' : ''}"><td class="rank-cell">${tied ? '' : (i + 1)}</td><td class="owner-cell">${e.owner}</td>${gHtml}<td class="total-cell">${e.total}</td></tr>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Rank</th><th>Entry</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th style="text-align:center">Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

loadAll();
setInterval(loadAll, 120000);
</script>

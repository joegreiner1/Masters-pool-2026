<html lang="en">
<head>

  <title>Masters Pool 2026 — In Memory of Geoff Martyn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep:  #0d2e1e;
      --green-mid:   #1a5436;
      --gold:        #c9a84c;
      --gold-light:  #e2c47a;
      --cream:       #f5f0e4;
      --cream-dark:  #e8e0cc;
      --white:       #fdfbf6;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--green-deep); color:var(--cream);
      font-family:'Cormorant Garamond',Georgia,serif; font-size:16px; min-height:100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%,  rgba(45,122,80,.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(26,84,54,.3)  0%, transparent 60%);
    }

    header { text-align:center; padding:30px 20px 20px; border-bottom:1px solid rgba(201,168,76,.25); }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4.5vw,2.8rem); font-weight:700; color:var(--white); letter-spacing:.04em; margin-bottom:5px; }
    h1 span { color:var(--gold); }
    .subtitle { font-size:.85rem; font-weight:300; color:var(--cream-dark); letter-spacing:.12em; text-transform:uppercase; margin-bottom:15px; }
    .memorial { display:inline-block; border:1px solid rgba(201,168,76,.4); border-radius:3px; padding:6px 15px; font-style:italic; font-size:.85rem; color:var(--gold-light); background:rgba(201,168,76,.07); }

    .status-bar { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; max-width:1100px; margin:15px auto 0; padding:10px 15px; background:rgba(26,84,54,.35); border:1px solid rgba(201,168,76,.15); border-radius:4px; }
    .status-pill { display:inline-flex; align-items:center; gap:7px; font-size:.75rem; letter-spacing:.06em; text-transform:uppercase; color:var(--cream-dark); }
    .dot { width:8px; height:8px; border-radius:50%; background:#aaa; }
    .dot.live { background:#4caf50; box-shadow:0 0 6px #4caf50; animation:pulse 2s infinite; }
    .dot.wait { background:var(--gold); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .refresh-btn { background:transparent; border:1px solid rgba(201,168,76,.4); color:var(--gold); padding:5px 12px; border-radius:3px; cursor:pointer; font-size:.75rem; text-transform:uppercase; transition:.2s; }
    .refresh-btn:hover { background:rgba(201,168,76,.12); }

    main { max-width:1100px; margin:0 auto; padding:20px 10px 60px; }

    .payout-banner { background:rgba(201,168,76,.05); border:1px solid rgba(201,168,76,.2); border-radius:6px; padding:15px; margin-bottom:20px; text-align:center; }
    .payout-grid { display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-top:10px; }
    .payout-item { font-size:1rem; color:var(--gold-light); }

    .table-wrap { overflow-x:auto; border-radius:6px; border:1px solid rgba(201,168,76,.2); background:rgba(13,46,30,.4); }
    table { width:100%; border-collapse:collapse; min-width:820px; }
    thead th { background:rgba(13,46,30,.9); color:var(--gold); font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; padding:12px; text-align:left; border-bottom:1px solid rgba(201,168,76,.3); }
    tbody tr { border-bottom:1px solid rgba(201,168,76,.05); }
    tbody tr:nth-child(even) { background:rgba(255,255,255,.02); }
    tbody tr.rank-1 { background:rgba(201,168,76,.1) !important; }
    td { padding:10px 12px; vertical-align:middle; }

    td.rank { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--gold); text-align:center; width:50px; }
    td.owner { font-weight:600; color:var(--white); width:140px; font-size:.9rem; }
    td.place-total { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; text-align:center; color:var(--gold); width:80px; }
    td.prize { font-size:.8rem; text-align:center; color:var(--gold-light); font-weight:600; width:90px; }

    /* GOLFER CELL */
    .golfer-cell { min-width:140px; }
    .golfer-name { font-size:.82rem; color:var(--white); display:block; font-weight:500; margin-bottom:5px; }
    .golfer-stats { display:flex; align-items:center; gap:6px; }

    /* Score to par */
    .g-score { font-size:.85rem; font-weight:700; font-family:'Playfair Display',serif; min-width:30px; }
    .g-score.under { color:#81c784; }
    .g-score.over  { color:#e57373; }
    .g-score.even  { color:var(--cream-dark); }

    .g-sep { color:rgba(245,240,228,.2); font-size:.7rem; }

    /* Hole / status */
    .g-thru { font-size:.7rem; color:rgba(245,240,228,.55); }

    /* Position badge */
    .g-pos { font-size:.68rem; padding:2px 6px; border-radius:3px; font-weight:700; }
    .g-pos.active   { background:rgba(76,175,80,.2);   color:#81c784; }

    .g-pos.mc       { background:rgba(192,57,43,.2);   color:#e57373; }
    .g-pos.pending  { background:rgba(201,168,76,.15); color:var(--gold); }

    footer { text-align:center; padding:30px; color:rgba(245,240,228,.2); font-size:.7rem; }

const PAYOUTS   = { 1:1982, 2:1068, 3:300, 4:150 };
const ESPN_URL  = 'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga';

// ═══════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════
async function fetchWithTimeout(url, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    return r;
  } catch(e) { clearTimeout(t); throw e; }
}

async function fetchESPN() {
  const urls = [
    ESPN_URL,
    'https://corsproxy.io/?' + encodeURIComponent(ESPN_URL),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(ESPN_URL)
  ];
  for (const url of urls) {
    try {
      const r = await fetchWithTimeout(url, 8000);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return parseESPN(await r.json());
    } catch(e) { console.warn('Trying next source:', e.message); }
  }
  throw new Error('All sources failed.');
}

// ═══════════════════════════════════════════════════
//  PARSE ESPN
// ═══════════════════════════════════════════════════
function parseESPN(data) {
  const players = data?.events?.[0]?.competitions?.[0]?.competitors || [];
  if (!players.length) throw new Error('No players found.');

  return players.map(p => {
    const statusType = (p?.status?.type?.name || '').toLowerCase();
    const thru       = p?.status?.thru;

    // --- status / thru display ---
    let thruLabel = '--';
    let stat      = 'active';
    if      (statusType.includes('cut') || statusType.includes('mc')) { stat = 'mc';       thruLabel = 'MC'; }
    else if (statusType.includes('wd'))                               { stat = 'wd';       thruLabel = 'WD'; }
    else if (statusType.includes('final') || thru === 18)             { stat = 'complete'; thruLabel = 'F';  }
    else if (thru > 0)                                                {                   thruLabel = String(thru); }
    else                                                              { stat = 'pending';  thruLabel = 'R1'; }

    // --- position: "T7", "3", "--" ---
    const displayPos = p?.status?.position?.displayValue || '--';

    // --- numeric position for scoring (strip T, fallback to 99) ---
    const numPos = parseInt(displayPos.replace('T','')) || p?.sortOrder || 99;

    // --- score to par: ESPN stores as displayValue string e.g. "-5", "E", "+2" ---
    const scorePar = p?.score?.displayValue ?? null;

    return {
      name:       p?.athlete?.displayName || 'Unknown',
      displayPos,
      numPos,
      stat,
      thruLabel,
      scorePar    // "-5" | "E" | "+2" | null
    };
  });
}

// ═══════════════════════════════════════════════════
//  SCORING
// ═══════════════════════════════════════════════════
function matchGolfer(name, lb) {
  const n    = name.toLowerCase().trim();
  const last = n.split(' ').pop();
  return lb.find(p => p.name.toLowerCase().includes(n) || n.includes(p.name.toLowerCase()))
      || lb.find(p => p.name.toLowerCase().endsWith(last));
}

function calculateScores(lb) {
  const activePlayers = lb.filter(p => p.stat !== 'mc' && p.stat !== 'wd').length;
  const mcPenalty     = activePlayers + 10;

  return ALL_ENTRIES.map(entry => {
    const golfers = entry.golfers.map(gName => {
      const m = matchGolfer(gName, lb);
      if (!m) return { name:gName, stat:'pending', displayPos:'--', numPos:99, scorePos:99, thruLabel:'--', scorePar:null };
      const scorePos = (m.stat === 'mc' || m.stat === 'wd') ? mcPenalty : m.numPos;
      return { ...m, scorePos };
    });
    return { owner:entry.owner, golfers, total: golfers.reduce((s,g) => s + g.scorePos, 0) };
  });
}

function rankEntries(entries) {
  const sorted = [...entries].sort((a,b) => a.total - b.total);
  return sorted.map((e,i) => {
    e.rank = (i > 0 && e.total === sorted[i-1].total) ? sorted[i-1].rank : i + 1;
    e.tied = (i > 0 && e.total === sorted[i-1].total);
    return e;
  });
}

function prizeFor(rank, ranked) {
  if (rank > 4) return '';
  const tied  = ranked.filter(e => e.rank === rank).length;
  let pot = 0;
  for (let i = rank; i < rank + tied; i++) { if (PAYOUTS[i]) pot += PAYOUTS[i]; }
  const share = Math.round(pot / tied);
  return share > 0 ? '$' + share.toLocaleString() : '';
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function scoreParClass(s) {
  if (!s || s === 'E') return 'even';
  if (s.startsWith('-'))  return 'under';
  return 'over';
}

function golferCell(g) {
  const sc       = g.scorePar || 'E';
  const scClass  = scoreParClass(g.scorePar);
  const posClass = g.stat === 'mc' ? 'mc' : g.stat === 'complete' ? 'complete' : g.stat === 'pending' ? 'pending' : 'active';
  const posLabel = g.displayPos === '--' ? '?' : g.displayPos;  // e.g. T7 or 3

  return `<td class="golfer-cell">
    <span class="golfer-name">${g.name}</span>
    <div class="golfer-stats">
      <span class="g-score ${scClass}">${sc}</span>
      <span class="g-sep">·</span>
      <span class="g-thru">${g.thruLabel}</span>
      <span class="g-sep">·</span>
      <span class="g-pos ${posClass}">${posLabel}</span>
    </div>
  </td>`;
}

function render(ranked) {
  const rows = ranked.map(e => `
    <tr class="${e.rank === 1 ? 'rank-1' : ''}">
      <td class="rank">${e.rank}</td>
      <td class="owner">${e.owner}</td>
      ${e.golfers.map(golferCell).join('')}
      <td class="place-total">${e.total}</td>
      <td class="prize">${prizeFor(e.rank, ranked)}</td>
    </tr>`).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Rank</th><th>Entry</th>
        <th>G1</th><th>G2</th><th>G3</th><th>G4</th>
        <th style="text-align:center">Place Total</th>
        <th style="text-align:center">Prize</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

async function loadAll() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot wait';
  txt.textContent = 'Syncing...';
  try {
    const players = await fetchESPN();
    const ranked  = rankEntries(calculateScores(players));
    render(ranked);
    dot.className = 'dot live';
    txt.textContent = 'Live';
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    dot.className = 'dot';
    txt.textContent = 'API Offline — tap Refresh';
    console.error(e);
  }
}

loadAll();
setInterval(loadAll, 300000);
